# gradle.properties
# Propiedades globales de Gradle para este proyecto.

# ---------------------------------------------------------------
# CORRECCIÓN PRINCIPAL: habilitar AndroidX
# Sin estas dos líneas, el plugin androidx.navigation.safeargs
# lanza el error: "can only be used with an androidx project"
# ---------------------------------------------------------------
android.useAndroidX=true
android.enableJetifier=true

# ---------------------------------------------------------------
# Optimizaciones de rendimiento de Gradle
# ---------------------------------------------------------------
# Permite que los módulos se compilen en paralelo
org.gradle.parallel=true

# Habilita el demonio de Gradle (se reutiliza entre builds)
org.gradle.daemon=true

# Memoria para el proceso de Gradle (ajustar según tu equipo)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Caché de configuración (evita reconfigurar proyectos sin cambios)
org.gradle.configuration-cache=false

# ---------------------------------------------------------------
# Kotlin
# ---------------------------------------------------------------
kotlin.code.style=official
